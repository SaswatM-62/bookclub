{% extends "base.html" %}
{% block title %}Add Meeting{% endblock %}
{% block content %}

<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('meetings_list') }}">Meetings</a></li>
        <li class="breadcrumb-item active">Add Meeting</li>
    </ol>
</nav>

<div class="card" style="max-width: 580px;">
    <div class="card-header">
        <h4 class="mb-0"><i class="bi bi-calendar-plus text-secondary"></i> Add New Meeting</h4>
    </div>
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Club <span class="text-danger">*</span></label>
                <select name="club_id" class="form-select" required>
                    <option value="">Select a club</option>
                    {% for c in clubs %}
                    <option value="{{ c.club_id }}"
                        {% if request.form.get('club_id', request.args.get('club_id', ''))|string == c.club_id|string %}selected{% endif %}>
                        {{ c.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Book</label>
                <select name="book_id" class="form-select">
                    <option value="">None</option>
                    {% for b in books %}
                    <option value="{{ b.book_id }}" {% if request.form.get('book_id')|string == b.book_id|string %}selected{% endif %}>
                        {{ b.title }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Meeting Date <span class="text-danger">*</span></label>
                    <input type="date" name="meeting_date" class="form-control" required
                           value="{{ request.form.get('meeting_date', '') }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Duration (minutes)</label>
                    <input type="number" name="duration_minutes" class="form-control" min="1"
                           value="{{ request.form.get('duration_minutes', '') }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control"
                       value="{{ request.form.get('location', '') }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    {% set cur = request.form.get('status', 'planned') %}
                    <option value="planned" {% if cur == 'planned' %}selected{% endif %}>Planned</option>
                    <option value="completed" {% if cur == 'completed' %}selected{% endif %}>Completed</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="3">{{ request.form.get('notes', '') }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-secondary">
                    <i class="bi bi-save"></i> Save Meeting
                </button>
                <a href="{{ url_for('meetings_list') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
