{% extends "base.html" %}
{% block title %}Edit: {{ club.name }}{% endblock %}
{% block content %}

<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('clubs_list') }}">Clubs</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('club_detail', club_id=club.club_id) }}">{{ club.name }}</a></li>
        <li class="breadcrumb-item active">Edit</li>
    </ol>
</nav>

<div class="card" style="max-width: 540px;">
    <div class="card-header">
        <h4 class="mb-0"><i class="bi bi-pencil text-warning"></i> Edit Club</h4>
    </div>
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Club Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required
                       value="{{ request.form.get('name', club.name) }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ request.form.get('description', club.description or '') }}</textarea>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Founded Date</label>
                    <input type="date" name="founded_date" class="form-control"
                           value="{{ request.form.get('founded_date', club.founded_date|string if club.founded_date else '') }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Meeting Frequency</label>
                    <select name="meeting_frequency" class="form-select">
                        <option value="">Select...</option>
                        {% set cur_freq = request.form.get('meeting_frequency', club.meeting_frequency or '') %}
                        {% for freq in ['Weekly', 'Biweekly', 'Monthly', 'Quarterly'] %}
                        <option value="{{ freq }}" {% if freq == cur_freq %}selected{% endif %}>
                            {{ freq }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">
                    <i class="bi bi-save"></i> Update Club
                </button>
                <a href="{{ url_for('club_detail', club_id=club.club_id) }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div class="card border-danger mt-4" style="max-width: 540px;">
    <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="bi bi-trash"></i> Danger Zone</h5>
    </div>
    <div class="card-body">
        <p class="text-muted mb-3">Deleting this club will also remove all meetings and member associations.</p>
        <form method="post" action="{{ url_for('club_delete', club_id=club.club_id) }}"
              onsubmit="return confirm('Delete club \'{{ club.name }}\'? This cannot be undone.')">
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash"></i> Delete Club
            </button>
        </form>
    </div>
</div>

{% endblock %}
