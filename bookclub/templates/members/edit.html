{% extends "base.html" %}
{% block title %}Edit: {{ member.name }}{% endblock %}
{% block content %}

<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('members_list') }}">Members</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('member_detail', member_id=member.member_id) }}">{{ member.name }}</a></li>
        <li class="breadcrumb-item active">Edit</li>
    </ol>
</nav>

<div class="card" style="max-width: 540px;">
    <div class="card-header">
        <h4 class="mb-0"><i class="bi bi-pencil text-warning"></i> Edit Member</h4>
    </div>
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" required
                       value="{{ request.form.get('name', member.name) }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" name="email" class="form-control" required
                       value="{{ request.form.get('email', member.email) }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control"
                       value="{{ request.form.get('phone', member.phone or '') }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Joined Date</label>
                <input type="date" name="joined_date" class="form-control"
                       value="{{ request.form.get('joined_date', member.joined_date|string if member.joined_date else '') }}">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">
                    <i class="bi bi-save"></i> Update Member
                </button>
                <a href="{{ url_for('member_detail', member_id=member.member_id) }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div class="card border-danger mt-4" style="max-width: 540px;">
    <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="bi bi-trash"></i> Danger Zone</h5>
    </div>
    <div class="card-body">
        <p class="text-muted mb-3">Deleting this member will also remove all their reviews and club memberships.</p>
        <form method="post" action="{{ url_for('member_delete', member_id=member.member_id) }}"
              onsubmit="return confirm('Delete member \'{{ member.name }}\'? This cannot be undone.')">
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash"></i> Delete Member
            </button>
        </form>
    </div>
</div>

{% endblock %}
